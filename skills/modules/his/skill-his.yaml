# ============================================
# 质量检查清单
# ============================================
quality_check:
  code_review:
    - "检查实体类是否继承正确的基类（TenantBaseDO）"
    - "检查 VO 类是否包含必要的校验注解"
    - "检查 Service 实现是否使用 @Service 注解"
    - "检查 Controller 是否使用 @RestController 注解"
    - "检查权限标识是否符合命名规范"
    - "检查错误码是否已定义"
    - "检查枚举类是否实现通用接口"

  sql_review:
    - "检查表名是否符合命名规范"
    - "检查是否包含必要字段（id, tenant_id, 审计字段）"
    - "检查索引是否包含 tenant_id"
    - "检查唯一索引是否包含 deleted"
    - "检查字段注释是否完整"

