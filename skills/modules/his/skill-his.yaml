# ============================================
# 目录结构规范
# ============================================
directory_structure:
  # Maven 模块结构
  maven_modules:
    pattern: |
      yudao-module-his/
      ├── yudao-module-his-api/           # API 模块：枚举、DTO、常量
      ├── yudao-module-his-biz/           # 业务模块：主要实现
      ├── yudao-module-his-op/            # 门诊管理子模块
      ├── yudao-module-his-ip/            # 住院管理子模块
      └── yudao-module-his-drug/          # 药品管理子模块

  # 业务模块包结构
  package_structure:
    pattern: |
      cn.iocoder.yudao.module.his
      ├── controller.admin.{feature}/     # Controller + VO
      │   ├── {Entity}Controller.java
      │   └── vo/
      │       ├── {Entity}SaveReqVO.java
      │       ├── {Entity}PageReqVO.java
      │       └── {Entity}RespVO.java
      ├── service.{feature}/             # Service 接口 + 实现
      │   ├── {Entity}Service.java
      │   └── {Entity}ServiceImpl.java
      ├── dal.dataobject.{feature}/      # DO 实体
      │   └── {Entity}DO.java
      ├── dal.mysql.{feature}/           # Mapper
      │   └── {Entity}Mapper.java
      ├── convert.{feature}/             # 对象转换
      │   └── {Entity}Convert.java
      └── enums/                         # 枚举

  # SQL 脚本目录
  sql_structure:
    pattern: |
      sql/mysql/his/
      ├── tables/                        # 表结构
      │   ├── 20260618_init_tables.sql
      │   ├── 20260618_exam_tables.sql
      │   └── ...
      └── data/                          # 初始数据
          ├── 20260618_init_data.sql
          ├── 20260618_dict_data.sql
          └── ...

# ============================================
# 命名规范
# ============================================
naming:
  # 实体类命名
  entity:
    pattern: "{EntityName}DO"
    examples:
      - table: "patient"
        class: "PatientDO"
      - table: "op_register"
        class: "OpRegisterDO"
      - table: "op_prescription"
        class: "OpPrescriptionDO"
      - table: "admission"
        class: "AdmissionDO"
      - table: "drug"
        class: "DrugDO"

  # VO 类命名
  vo:
    save_req: "{EntityName}SaveReqVO"
    page_req: "{EntityName}PageReqVO"
    resp: "{EntityName}RespVO"

  # Service 命名
  service:
    interface: "{EntityName}Service"
    impl: "{EntityName}ServiceImpl"

  # Mapper 命名
  mapper: "{EntityName}Mapper"

  # Controller 命名
  controller: "{EntityName}Controller"

  # 权限标识
  permission:
    pattern: "his:{feature}:{operation}"
    examples:
      - "his:patient:create"
      - "his:patient:update"
      - "his:patient:delete"
      - "his:patient:query"
      - "his:register:create"
      - "his:prescription:audit"

# ============================================
# API 接口规范
# ============================================
api:
  # RESTful 接口规范
  restful:
    create:
      method: "POST"
      path: "/create"
      permission: "{module}:{feature}:create"

    update:
      method: "PUT"
      path: "/update"
      permission: "{module}:{feature}:update"

    delete:
      method: "DELETE"
      path: "/delete"
      permission: "{module}:{feature}:delete"

    get:
      method: "GET"
      path: "/get"
      permission: "{module}:{feature}:query"

    page:
      method: "GET"
      path: "/page"
      permission: "{module}:{feature}:query"

    export:
      method: "GET"
      path: "/export-excel"
      permission: "{module}:{feature}:export"

  # 分页参数
  pagination:
    default_page_no: 1
    default_page_size: 10
    max_page_size: 100

# ============================================
# 业务流程规范
# ============================================
workflows:
  # 门诊就诊流程
  outpatient_visit:
    steps:
      - step: "预约/挂号"
        description: "患者预约或现场挂号"
        tables: ["op_appointment", "op_register"]
      - step: "候诊"
        description: "患者候诊等待叫号"
        tables: ["op_register"]
      - step: "就诊"
        description: "医生接诊，录入诊断"
        tables: ["op_register", "diagnosis"]
      - step: "开立处方"
        description: "医生开立处方"
        tables: ["op_prescription", "op_prescription_item"]
      - step: "收费"
        description: "患者缴费"
        tables: ["op_fee", "op_payment"]
      - step: "取药"
        description: "药房发药"
        tables: ["op_dispense"]

  # 住院流程
  inpatient_admission:
    steps:
      - step: "入院登记"
        description: "办理入院手续，分配床位"
        tables: ["admission", "bed"]
      - step: "入院评估"
        description: "护士进行入院评估"
        tables: ["admission_assess"]
      - step: "医嘱处理"
        description: "医生开立医嘱，护士执行"
        tables: ["order", "medication_admin"]
      - step: "护理记录"
        description: "护士记录护理过程"
        tables: ["nursing_record", "vital_sign"]
      - step: "出院结算"
        description: "办理出院结算"
        tables: ["discharge", "discharge_summary"]

