# HIS 医院信息系统模块 Skill
# 基于 yudao-vue-pro 框架的 HIS 核心业务实现规范

skill:
  id: "his-module"
  name: "HIS 医院信息系统模块 Skill"
  version: "1.0.0"
  category: "module"
  description: "HIS 医院信息系统核心模块实现规范，包含门诊管理(M01)、住院管理(M02)、药品管理(M06)等核心业务"
  created_at: "2026-06-18"
  updated_at: "2026-06-18"

# ============================================
# 模块概述
# ============================================
module:
  code: "his"
  name: "HIS 医院信息系统"
  description: |
    HIS（Hospital Information System）医院信息系统，包含：
    - M01 门诊管理：挂号、预约、就诊、处方、收费
    - M02 住院管理：入院、床位、医嘱、护理、出院
    - M06 药品管理：药品目录、库存、采购、发药
    - M09 系统管理：科室、人员、字典（由 yudao 框架提供）

  sub_modules:
    - code: "op"
      name: "门诊管理"
      prefix: "op_"
      description: "门诊业务流程管理"
      features:
        - "患者管理：患者主索引、就诊卡"
        - "预约挂号：医生排班、预约管理"
        - "门诊就诊：叫号、诊断、处方"
        - "门诊收费：费用计算、支付、退费"
        - "检验检查：申请、报告"

    - code: "ip"
      name: "住院管理"
      prefix: ""
      description: "住院业务流程管理"
      features:
        - "入院管理：入院登记、床位分配"
        - "医嘱管理：长期/临时医嘱、执行"
        - "护理管理：护理记录、交接班"
        - "出院管理：出院结算、小结"

    - code: "drug"
      name: "药品管理"
      prefix: "drug_"
      description: "药品全流程管理"
      features:
        - "药品目录：药品信息、价格"
        - "库存管理：入库、出库、盘点"
        - "药品采购：采购计划、供应商"
        - "合理用药：配伍禁忌、剂量审核"

# ============================================
# 表前缀规范
# ============================================
table_prefixes:
  # 门诊业务表（op_前缀）
  outpatient_tables:
    - prefix: "op_"
      usage: "门诊业务表"
      examples:
        - "op_schedule"          # 医生排班
        - "op_appointment"       # 预约挂号
        - "op_register"          # 挂号记录
        - "op_prescription"      # 处方主表
        - "op_prescription_item" # 处方明细
        - "op_fee"               # 门诊费用
        - "op_payment"           # 支付记录
        - "op_refund"            # 退费记录
        - "op_dispense"          # 发药记录

  # 住院业务表（无前缀，直接使用业务名称）
  inpatient_tables:
    - prefix: ""
      usage: "住院业务表"
      examples:
        - "admission"            # 入院记录
        - "ward"                 # 病区
        - "bed"                  # 床位
        - "order"                # 医嘱主表
        - "nursing_record"       # 护理记录
        - "discharge"            # 出院记录
        - "prepayment"           # 预交金
        - "medication_admin"     # 给药记录(eMAR)
        - "vital_sign"           # 生命体征

  # 药品管理表（drug_前缀）
  drug_tables:
    - prefix: "drug_"
      usage: "药品管理表"
      examples:
        - "drug"                 # 药品目录
        - "drug_stock"           # 药品库存
        - "drug_inbound"         # 入库记录
        - "drug_outbound"        # 出库记录
        - "drug_inventory"       # 盘点记录
        - "drug_purchase"        # 采购计划
        - "drug_interaction"     # 药物相互作用
        - "drug_contraindication"# 配伍禁忌

  # 基础字典表（无前缀）
  base_tables:
    - prefix: ""
      usage: "HIS 基础字典表"
      examples:
        - "patient"              # 患者主索引
        - "patient_card"         # 就诊卡
        - "department"           # 科室信息
        - "staff"                # 医护人员
        - "charge_item"          # 收费项目字典
        - "diagnosis"            # 诊断记录
        - "supplier"             # 供应商

  # 检验检查表
  exam_tables:
    - prefix: ""
      usage: "检验检查表"
      examples:
        - "exam_request"         # 检查申请
        - "exam_item"            # 检查项目
        - "exam_report"          # 检查报告
        - "lab_request"          # 检验申请
        - "lab_item"             # 检验项目
        - "lab_report"           # 检验报告

# ============================================
# 错误码规范
# ============================================
error_codes:
  prefix: "1_015"
  range: "1_015_000_000 - 1_019_999_999"

  categories:
    - code: "1_015"
      name: "门诊管理"
      range: "1_015_000_000 - 1_015_999_999"
      errors:
        - code: "1_015_000_001"
          message: "患者不存在"
        - code: "1_015_001_001"
          message: "排班不存在"
        - code: "1_015_001_002"
          message: "号源已满"
        - code: "1_015_003_001"
          message: "处方不存在"

    - code: "1_016"
      name: "住院管理"
      range: "1_016_000_000 - 1_016_999_999"
      errors:
        - code: "1_016_000_001"
          message: "入院记录不存在"
        - code: "1_016_001_001"
          message: "床位不可用"
        - code: "1_016_002_001"
          message: "预交金不足"
        - code: "1_016_003_001"
          message: "医嘱已停止"

    - code: "1_017"
      name: "药品管理"
      range: "1_017_000_000 - 1_017_999_999"
      errors:
        - code: "1_017_000_001"
          message: "药品不存在"
        - code: "1_017_001_001"
          message: "药品库存不足"
        - code: "1_017_002_001"
          message: "入库记录不存在"

